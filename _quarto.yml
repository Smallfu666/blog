  output-dir: docs

website:
  title: "Han-Yin Chang"
  description: "Database/Storage Systems"
  favicon: favicon.svg
  navbar:
    right:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/Smallfu666

  page-footer:
    center:
      - text: "© Han-Yin Chang"

format:
